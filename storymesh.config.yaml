# ------
# StoryMesh Global Configuration File
# ------
# Non-secret settings that control the pipeline.
# API keys live in .env (see .env.example). This file is part of
# the code repo so that model choices, temperatures, and defaults
# are controllable and trackable over time.
#------

# ------
# LLM defaults
# ------
# These settings apply when an agent does not specify overrides.
llm:
  default_provider: anthropic
  default_model: claude-haiku-4-5-20251001
  default_max_tokens: 2048
  default_temperature: 1.0

prompts:
  style: default
  # The prepend key is available to experiment with Context priming, a
  # technique which injects a short, unrelated statement at the start of the
  # system prompt to prime the model toward less common starting points.
  # This is a poorly documented technique from https://arxiv.org/abs/2102.07350
  prepend:
    seed: 42
    pool:
      # Sensory / material surprises
      - "The moon smells like gunpowder. Apollo astronauts reported this from lunar dust that clung to their suits."
      - "Old books smell the way they do because of the same chemical breakdown that produces vanilla."
      - "Some coral reefs make a crackling sound loud enough to be heard from the surface."
      - "Baby flamingos are born grey. The pink comes entirely from pigments in the algae they eat."
      - "The color of carrots was changed from purple to orange by Dutch farmers in the 17th century."
      - "Sand from deserts cannot be used in construction — it is too smooth. Concrete is made from river sand."
      - "Aerogel is 99.98% air and can support several thousand times its own weight."
      # Scale inversions
      - "The blue whale's heartbeat is slow enough that a diver could swim between pulses."
      - "A single teaspoon of neutron star material would weigh approximately one billion tons."
      - "The gap between any two atoms in your body is proportionally larger than the gap between stars."
      - "Pluto has not yet completed a single orbit around the sun since it was discovered."
      - "A mayfly lives for one day as an adult. It has no mouth and cannot eat."
      # Behavioral mismatches
      - "Squirrels deliberately plant decoy nuts when they think they are being watched."
      - "Crows leave small gifts — buttons, foil, smooth pebbles — for humans who feed them regularly."
      - "Dolphins have been documented calling each other by unique whistles that function as names."
      - "Sea otters hold hands while sleeping so they do not drift apart."
      - "Pigeons can recognize individual human faces and remember people who have treated them badly."
      - "Elephants have been observed standing vigil over their dead for days, touching the bones with their trunks."
      - "Octopuses have been observed carrying coconut shells across the ocean floor to use as portable shelters."
      - "A species of jellyfish reverts to its juvenile state when stressed, then grows up again — potentially indefinitely."
      - "Some trees respond to being browsed by making their leaves chemically bitter within minutes of the first bite."
      # Temporal whiplash
      - "Mammoths were still alive when the Great Pyramid was being built."
      - "The light reaching Earth from distant stars left them before humans existed."
      - "Every atom in your body was forged inside a star that no longer exists."
      - "The oldest known living organism is a fungus in Oregon. It is estimated to be eight thousand years old."
      - "A dwarf species of mammoth survived on a remote Arctic island until three thousand years ago."
      - "Some of the trees alive today were saplings when the Roman Empire was at its height."
      # Bureaucratic / institutional absurdity
      - "Fact: There is an official name for the average color of the observable universe. It is called Cosmic Latte."
      - "Fact: The United States has a federally mandated shade of yellow reserved exclusively for school buses."
      - "Fact: There is a graveyard for decommissioned spacecraft at the bottom of the Pacific Ocean."
      - "Fact: There is a committee responsible for naming glaciers."
      - "Fact: Sign languages are not universal. British and American sign languages are mutually unintelligible."
      # Mundane made strange
      - "Every refrigerator on Earth is engaged in a permanent, losing battle against entropy."
      - "The Post-it note adhesive was originally a failed attempt to make the strongest glue ever produced."
      - "Velcro was invented by a man who spent years studying the hooks of burr seeds under a microscope."
      - "Competitive cheese rolling in Gloucestershire results in more hospitalizations per event than most contact sports."
      - "Professional tea tasters can identify the region, altitude, and harvest season of a tea from taste alone."
      - "The concrete of ancient Roman harbors is still hardening. Seawater makes it stronger over time."
      # Perception / cognition
      - "What humans experience as vision is mostly a prediction generated by the brain, updated by occasional glances from the eyes."
      - "The brain does not receive a signal for the color magenta — it invents it to bridge a gap in the spectrum."
      - "The feeling of being watched, which triggers before you consciously register a gaze, is measurable and real."
      - "Humans are the only animals known to blush."
      - "The human nose can distinguish over one trillion distinct smells, but most of them have no name."
      # Hidden structures
      - "There are lakes inside the ocean — pools of dense brine on the seafloor with their own shorelines and waves."
      - "A flock of starlings moving together is called a murmuration. No single bird leads it."
      - "There is a tree in the Mojave Desert believed to be eleven thousand years old. It looks like a bush."
      - "Snails can sleep for up to three years when conditions require it."
      - "Certain fish change sex multiple times throughout their lives depending on the social needs of the group."
      # Language / concept gaps
      - "The Japanese language has a word, ma, for the meaningful silence between notes — the space that gives sound its shape."
      - "There is a specific sadness associated with places that are no longer what they were. Most languages have no word for it."
      - "A shrimp's heart is located in its head."

# ------
# Per-Agent overrides
# ------
agents:
  genre_normalizer:
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 4096

  voice_profile_selector:
    provider: anthropic
    model: claude-haiku-4-5-20251001  # Lightweight classifier — Haiku is sufficient
    temperature: 0.0                   # Deterministic: same input always selects the same profile
    max_tokens: 256                    # Small output: profile_id + one-sentence rationale
    # voice_profile_override: cozy_warmth  # Uncomment to force a specific profile for all runs
  book_ranker:
    top_n: 10
    llm_rerank: false
    provider: anthropic
    model: claude-haiku-4-5-20251001
    temperature: 0.0
    max_tokens: 1024
    rating_confidence_threshold: 50
    mmr_lambda: 0.6      # 1.0 = pure relevance, 0.0 = pure diversity (subject-tag Jaccard)
    mmr_candidates: 30   # top-N pool considered for MMR selection
    weights:
      genre_overlap: 0.40
      reader_engagement: 0.25
      rating_quality: 0.20
      rating_volume: 0.15
  theme_extractor:
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.6
    max_tokens: 4096
    max_seeds: 5
  proposal_draft:
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 1.0
    max_tokens: 4096
    num_candidates: 5
    selection_temperature: 0.2
    selection_max_tokens: 2048
    revision_temperature: 0.5  # Lower temp for directed revision — precision over variance

  proposal_reader:
    provider: openai            # Cross-provider: different model finds what the drafter cannot see
    model: gpt-4o
    temperature: 0.4            # Analytical but allows natural variation in reader reactions
    max_tokens: 1024            # Reader feedback is short — five structured fields

  rubric_judge:
    provider: openai          # Different provider than proposal_draft for independent evaluation
    model: gpt-4o
    temperature: 0.0          # Deterministic evaluation — same proposal should score the same
    max_tokens: 4096
    pass_threshold: 6         # Sum of tier scores (max 10). Presets: draft=5, standard=6, high=7

  story_writer:
    provider: anthropic
    model: claude-sonnet-4-6      # Best available for long-form creative prose
    outline_temperature: 0.5      # Structured outline benefits from lower variance
    draft_temperature: 0.8        # Medium-high: creative range without incoherence
    summary_temperature: 0.4      # Back-cover copy: controlled marketing register
    outline_max_tokens: 4096
    draft_max_tokens: 8000        # Supports up to ~6000-word drafts with margin
    summary_max_tokens: 1024
    maximum_words: 4500           # Hard creative ceiling, not a target to fill
    length_policy: story_natural  # Use the shortest length that completes the story

  cover_art:
    image_provider: openai
    image_model: gpt-image-1
    image_size: "1024x1536"
    image_quality: auto

  resonance_reviewer:
    review_provider: openai             # Cross-provider: different model finds different blind spots
    review_model: gpt-4o                # Reasoning model for emotional/contextual sensitivity
    revision_provider: anthropic        # Same as writer for voice consistency
    revision_model: claude-sonnet-4-6
    review_temperature: 0.4             # Analytical but sensitive
    revision_temperature: 0.7           # Creative but controlled
    summary_temperature: 0.4            # Back-cover summary re-run
    review_max_tokens: 4096
    revision_max_tokens: 8000           # Must hold full revised draft
    summary_max_tokens: 1024

  book_assembler:
    output_formats: ["pdf", "epub"]   # Formats to generate; remove either to skip it

  # To use OpenAI for any agent, set provider and model:
  # proposal_draft:
  #   provider: openai
  #   model: gpt-4o
  #   temperature: 0.7
  #   max_tokens: 2048

# ------
# External API Clients
# ------
api_clients:
  open_library:
    user_agent:    # Optional; "AppName (contact@email.com)" for higher rate limit
    max_books: 50  # Total cap after deduplication across all genre queries
    sort_strategies: ["editions", "rating"]  # Per-genre sort passes; more passes = broader candidate pool
    limit_per_sort: 15  # Books fetched per sort pass per genre (total ≤ max_books after dedup)
    timeout: 30         # HTTP request timeout in seconds (OL can be slow for large result sets)
    max_retries: 8      # Max attempts per API request (OL returns 503 frequently)

# ------
# Caching Configuration
# ------
cache:
  dir: ~/.cache/storymesh

# ------
# Logging
# ------
logging:
  level: INFO

# ------
# Email Delivery (optional)
# ------
# When recipient is set, a rich HTML email with the PDF (and optionally EPUB)
# attached is sent automatically after every book assembly.
# Credentials can be set here or via environment variables:
#   STORYMESH_SMTP_USER     — overrides smtp_user
#   STORYMESH_SMTP_PASSWORD — overrides smtp_password
email:
  smtp_host: ""       # e.g. smtp.gmail.com
  smtp_port: 587      # 587 for STARTTLS (recommended), 465 for SSL
  smtp_user: ""       # sender account / login (or set STORYMESH_SMTP_USER)
  smtp_password: ""   # app password or SMTP password (or set STORYMESH_SMTP_PASSWORD)
  from_address: ""    # defaults to smtp_user when blank
  recipient: ""       # delivery address; leave blank to disable email delivery
  include_epub: false # set true to attach the EPUB alongside the PDF

# ------
# Kiosk Frontend (optional)
# ------
# Settings for the conference-booth kiosk web app (storymesh.kiosk).
# Only consulted when running `python -m storymesh.kiosk`.
kiosk:
  max_concurrent_runs: 5    # Number of pipelines that can run simultaneously
  idle_reset_seconds: 90    # Wizard auto-returns to Welcome after this idle time
  bind_host: 127.0.0.1      # Listen address for the FastAPI server
  bind_port: 8000           # Listen port
  seed_from_recent_runs: 4  # Pre-populate gallery with the N most recent successful runs on startup (0 disables)

# ------
# LangSmith Observability (optional)
# ------
# Enable tracing: pip install "storymesh[langsmith]"
# Then set LANGCHAIN_TRACING_V2=true and LANGCHAIN_API_KEY in .env.
# The project name groups all pipeline runs in the LangSmith dashboard.
# LangGraph node spans are traced automatically; individual LLM calls are
# traced via the @_traceable decorator in storymesh.llm.base.
langsmith:
  project: storymesh-dev
