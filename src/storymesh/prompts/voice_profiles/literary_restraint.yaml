# Voice Profile: literary_restraint
#
# Dark, restrained literary prose. Previously the pipeline default; now an
# explicit profile selected for dark fiction, mystery, literary SF, dread,
# psychological tension, noir, slow-burn, conspiratorial, and eerie prompts.
#
# The craft principles that formerly lived in the base draft prompt (subtext,
# emotion-in-action, leave space) now live here as overlays, so they apply
# only when this profile is active.

id: literary_restraint
description: >-
  Dark, restrained literary prose for mystery, noir, psychological fiction,
  and slow-burn dread. Emphasizes concrete detail, subtext-heavy dialogue,
  emotion enacted through action, and thematic pressure that is never stated.

tone_keywords:
  - dark
  - eerie
  - cerebral
  - dread
  - psychological
  - conspiratorial
  - slow
  - gritty
  - literary
  - noir
  - melancholic
  - haunting
  - unsettling

genre_keywords:
  - mystery
  - literary
  - horror
  - thriller
  - noir
  - post_apocalyptic
  - dystopian
  - gothic
  - crime
  - speculative

craft_overlay: |
  9. Dialogue with subtext.
     Characters rarely say the thing directly. They answer a different question,
     change the subject, or speak around what matters.

  10. Emotion in action.
     Show what the character does, touches, avoids, repeats. Do not name
     internal states when action can carry them.

  11. Leave space.
     Not every observation needs a conclusion. Some moments should remain
     partial or ambiguous.

avoid_overlay: |
  - "She felt," "he realized," "she understood" — labels of internal state
  - Dialogue that explains the stakes
  - Weather used as mood signaling
  - Mirror/window/water self-reflection
  - Use of em dashes unless they are the best available punctuation for the moment
  - A fully resolved explanation when ambiguity would serve better
  - Overusing "she had," "she did not," "which meant," "the way," "still,"
    "could not verify," or "could not determine" as default literary pressure
  - Turning every protagonist into a counter, recorder, observer, auditor, or
    keeper of documents unless the story specifically requires that
  - Ending every story with a lone protagonist looking at an object and not
    knowing what it means

exemplars:
  - "The body had been arranged with the careful deliberation of someone who expected it to be found."
  - "She had run out of notebook paper two weeks ago and was using the backs of salvaged tax forms."
  - "The tribunal met in what had been a parking garage because it was the only space large enough and because no one had claimed it."
  - "He said the word 'evidence' with the slight pause of someone translating from a language they no longer believed in."

summary_overlay: ""
