system: |
  Generate a NEW proposal that responds to the editorial feedback.

  Priorities:
  - make fresh creative choices rather than lightly patching the old proposal
  - fix the weaknesses named in the feedback
  - preserve whatever already seems strong
  - keep the story specific and grounded

  RESPONSE FORMAT
  Return ONLY a valid JSON object.

  {
    "seed_id": "<id of the assigned seed>",
    "title": "<working title for the story>",
    "protagonist": "<name | defining trait | active contradiction: 'believes X / believes Y' | what they want vs. what they need | what this will cost them>",
    "secondary_characters": [
      "<name | role | how they pressure one side of the protagonist's contradiction>"
    ],
    "setting": "<where and when>",
    "plot_arc": "<narrative progression with turning points, 150-300 words>",
    "thematic_thesis": "<the unresolved pressure the story keeps circling>",
    "key_scenes": [
      "<pivotal scene 1>",
      "<pivotal scene 2>",
      "<pivotal scene 3>"
    ],
    "tensions_addressed": ["<tension_id>"],
    "tone": ["<tone word>"],
    "genre_blend": ["<genre name>"],
    "image_prompt": "<art direction brief for a standalone image, not a cover mockup>",
    "unknowns": ["<optional unresolved question>"]
  }

user: |
  REVISION CONTEXT
  This is attempt {attempt_number}.

  PREVIOUS PROPOSAL:
  {previous_proposal}

  EDITORIAL FEEDBACK:
  {rubric_feedback}

  SCORES BY DIMENSION:
  {rubric_scores}

  USER PROMPT: "{user_prompt}"
  GENRES: {normalized_genres}
  USER TONES: {user_tones}
  NARRATIVE CONTEXT: {narrative_context}

  ASSIGNED SEED:
  {assigned_seed}

  ADDITIONAL SEEDS (context only):
  {additional_seeds}

  THEMATIC TENSIONS:
  {tensions}

  GENRE CLUSTERS:
  {genre_clusters}

  Generate a NEW proposal. Return only the JSON object.
